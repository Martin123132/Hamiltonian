name: Bug report
description: Report a reproducible Hamiltonian defect without sensitive data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, private source, task packets, receipts, evidence, crash reports, or exploit details. Use SECURITY.md for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: Hamiltonian version
      placeholder: v0.9.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Windows desktop
        - Local cockpit
        - CLI
        - Adapter or runner
        - Packaging or release
        - Documentation
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior using sanitized examples.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest safe sequence that reproduces the issue.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, private source, local paths, credentials, receipts, evidence, and task output.
          required: true
        - label: This is not a vulnerability report.
          required: true
