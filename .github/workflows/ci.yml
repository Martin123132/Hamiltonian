name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[test]"
      - name: Run tests
        run: python -m pytest -q
      - name: Compile Python sources
        run: python -m compileall -q src tests
      - name: Check patch whitespace
        run: git diff --check

  browser-smoke:
    name: Browser smoke (Windows)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e ".[test]"
      - name: Run deterministic browser journey
        run: node scripts/cockpit_browser_smoke.mjs
        env:
          HAMILTONIAN_QA_ROOT: ${{ runner.temp }}\HamiltonianQA
      - name: Upload browser screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-smoke-screenshots-${{ github.run_attempt }}
          path: ${{ runner.temp }}\HamiltonianQA\*.jpg
          if-no-files-found: ignore
          retention-days: 7

  desktop-build:
    name: Desktop package (Windows)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Build portable desktop package
        shell: powershell
        run: >-
          .\scripts\build-windows-app.ps1
          -OutputRoot "${{ runner.temp }}\HamiltonianBuild"
          -DataRoot "${{ runner.temp }}\HamiltonianData"
      - name: Verify release manifest and checksum
        shell: powershell
        run: |
          $root = "${{ runner.temp }}\HamiltonianBuild"
          $manifestPath = Get-ChildItem $root -Filter "*.release.json" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $manifestPath) { throw "Release manifest was not produced" }
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $artifact = Join-Path $root $manifest.artifact
          if (-not (Test-Path $artifact)) { throw "Release artifact was not produced" }
          $actual = (Get-FileHash $artifact -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $manifest.artifact_sha256) { throw "Release artifact checksum mismatch" }
          if ($manifest.source_commit -ne $env:GITHUB_SHA) { throw "Release source commit mismatch" }
          if ($manifest.source_dirty) { throw "CI release artifact came from a dirty worktree" }
          if ($manifest.signed) { throw "Unsigned prototype build unexpectedly claims signing" }
          if ($manifest.license -ne "PolyForm-Noncommercial-1.0.0") { throw "Release license metadata mismatch" }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($artifact)
          try {
            $entryNames = @($archive.Entries | ForEach-Object { $_.FullName })
          } finally {
            $archive.Dispose()
          }
          foreach ($required in @("LICENSE", "NOTICE.md", "README.md")) {
            if ($required -notin $entryNames) { throw "Release archive is missing $required" }
          }
      - name: Upload portable desktop package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hamiltonian-windows-x64-${{ github.sha }}
          path: |
            ${{ runner.temp }}\HamiltonianBuild\Hamiltonian-windows-x64-*.zip
            ${{ runner.temp }}\HamiltonianBuild\Hamiltonian-windows-x64-*.release.json
            ${{ runner.temp }}\HamiltonianBuild\Hamiltonian-windows-x64-*.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
